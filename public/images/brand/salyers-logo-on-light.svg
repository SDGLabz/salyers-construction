<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 92" role="img" aria-label="Salyers Construction">
  <!-- skyline -->
  <g fill="#c5302b">
    <rect x="10" y="23" width="7" height="13"/>
    <rect x="19" y="16" width="6" height="20"/>
    <rect x="27" y="25" width="7" height="11"/>
    <rect x="36" y="11" width="6" height="25"/>
    <rect x="38" y="5" width="1.6" height="6"/>
    <rect x="44" y="20" width="7" height="16"/>
    <rect x="53" y="8" width="9" height="28"/>
    <polygon points="53,8 57.5,1 62,8"/>
    <rect x="64" y="23" width="5" height="13"/>
    <rect x="71" y="15" width="7" height="21"/>
    <rect x="80" y="26" width="6" height="10"/>
  </g>
  <!-- SC monogram -->
  <text x="48" y="84" text-anchor="middle" fill="#c5302b"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900"
    font-size="48" letter-spacing="-2">SC</text>
  <!-- wordmark (navy on light backgrounds) -->
  <text x="96" y="46" textLength="150" lengthAdjust="spacingAndGlyphs" fill="#15263f"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900"
    font-size="29">SALYERS</text>
  <text x="96" y="70" textLength="150" lengthAdjust="spacingAndGlyphs" fill="#c5302b"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900"
    font-size="15">CONSTRUCTION</text>
</svg>
